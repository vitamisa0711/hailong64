<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Gửi anh ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<div class="container">
  <h1 class="title">Hey anh 💖</h1>

  <div class="gift-box" onclick="openGift()">
    🎁
  </div>

  <div id="content" class="hidden">
    <h2>Em có điều muốn nói 💌</h2>
    <p id="text"></p>
    <button onclick="showLove()">Bấm vào đây nè 😆</button>
  </div>

  <div id="love" class="hidden">
    <h1 class="love-text">I LOVE YOU ❤️</h1>
  </div>
</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
